name: macOS build

on:
  workflow_dispatch:

jobs:
  # Deletes every modern JS API pdf.js needs (simulating the Safari 16.4
  # floor), installs our polyfills, and opens a real PDF end to end. Gates
  # the build: an incomplete polyfill set is exactly what shipped broken in
  # v1.2.0 ("getOrInsertComputed is not a function" on every document open).
  compat-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/test-webkit-compat.mjs

  build:
    needs: compat-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            name: apple-silicon
          - target: x86_64-apple-darwin
            name: intel
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm install

      - name: Build, sign and notarize
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles dmg

      - name: Upload dmg
        uses: actions/upload-artifact@v4
        with:
          name: NoBloatPDF-macos-${{ matrix.name }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error

  # Install the freshly built DMG on the (Apple Silicon) runner, launch the
  # app with a generated PDF, and PROVE the page rendered: screenshot the app
  # window and require a large near-white region (the rendered page). A
  # process-alive check is not enough; the v1.2.0 open-failure dialog kept
  # the process running and screenshots were never inspected. Also runs the
  # polyfill set through this macOS's own JavaScriptCore (the engine
  # WKWebView uses) as a builtin-availability check.
  # macos-15 matters most: its WebKit (Safari 18.x) lacks the newest JS
  # builtins, so it fails exactly like end-user Macs did on v1.2.0 unless
  # the polyfills cover them. macos-latest proves current macOS too.
  smoke-test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/download-artifact@v4
        with:
          name: NoBloatPDF-macos-apple-silicon
          path: dmg

      - name: Verify JS builtins in this macOS's JavaScriptCore
        run: swift scripts/run-jsc.swift src/web/polyfills.js scripts/check-jsc-apis.js

      - name: Install app from dmg
        run: |
          sw_vers
          hdiutil attach dmg/*.dmg -nobrowse -mountpoint /Volumes/nobloat
          cp -R "/Volumes/nobloat/No Bloat PDF.app" /Applications/
          hdiutil detach /Volumes/nobloat

      - name: Generate test PDF
        run: |
          node -e '
            const objs = [
              "<< /Type /Catalog /Pages 2 0 R >>",
              "<< /Type /Pages /Kids [3 0 R] /Count 1 >>",
              "<< /Type /Page /Parent 2 0 R /MediaBox [0 0 612 792] /Contents 4 0 R /Resources << /Font << /F1 5 0 R >> >> >>",
              null, // content stream, built below
              "<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>",
            ];
            const text = "BT /F1 32 Tf 72 700 Td (No Bloat PDF smoke test) Tj ET";
            objs[3] = `<< /Length ${text.length} >>\nstream\n${text}\nendstream`;
            let pdf = "%PDF-1.4\n";
            const offsets = [];
            objs.forEach((body, i) => {
              offsets.push(pdf.length);
              pdf += `${i + 1} 0 obj\n${body}\nendobj\n`;
            });
            const xref = pdf.length;
            pdf += `xref\n0 ${objs.length + 1}\n0000000000 65535 f \n` +
              offsets.map((o) => String(o).padStart(10, "0") + " 00000 n \n").join("") +
              `trailer\n<< /Size ${objs.length + 1} /Root 1 0 R >>\nstartxref\n${xref}\n%%EOF\n`;
            require("fs").writeFileSync("smoke-test.pdf", pdf);
          '

      - name: Launch app with PDF and screenshot
        run: |
          # Full path, not app name: LaunchServices may not have registered
          # the just-copied app yet, and name lookup then fails.
          open -a "/Applications/No Bloat PDF.app" "$PWD/smoke-test.pdf"
          sleep 10
          screencapture -x shot-10s.png
          sleep 15
          screencapture -x shot-25s.png
          pgrep -x no-bloat-pdf || { echo "app not running"; exit 1; }

      - name: Verify the PDF page actually rendered
        run: |
          if WINDOW_ID="$(swift scripts/find-window-id.swift "No Bloat")"; then
            echo "app window id: $WINDOW_ID"
            screencapture -x -o -l "$WINDOW_ID" shot-window.png || true
          fi
          # Window capture is preferred (no wallpaper noise); fall back to the
          # full-screen shot if it was unavailable or blocked by TCC.
          node scripts/check-smoke-screenshot.mjs shot-window.png 0.15 \
            || node scripts/check-smoke-screenshot.mjs shot-25s.png 0.15

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-screenshots-${{ matrix.os }}
          path: shot-*.png
          if-no-files-found: warn
